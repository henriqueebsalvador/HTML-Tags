<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tags</title>
</head>
<body>
    <hr>

    <!-- ============================= -->
    <h2>Tag de Comentário</h2>
    <p>A tag de comentário serve para escrever algo que não aparece na página.</p>

    <p>Exemplo de código:</p>

    &lt;!-- Isso é um comentário --&gt;

    <!-- Isso é um comentário -->
    <p>O comentário não aparece na tela.</p>

    <hr>

    <!-- ============================= -->
</body>
</html>
